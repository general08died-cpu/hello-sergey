<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Степан Серегин</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-start: #0f0c29;
      --bg-mid: #1a1440;
      --bg-end: #24243e;
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.65);
      --btn-bg: rgba(255, 255, 255, 0.08);
      --btn-hover: rgba(255, 255, 255, 0.14);
      --btn-border: rgba(255, 255, 255, 0.12);
      --accent: #7c6cf0;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-primary);
      background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-mid) 45%, var(--bg-end) 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      line-height: 1.5;
    }

    .page {
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px 28px 32px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 4px 24px rgba(124, 108, 240, 0.25);
    }

    .name {
      font-size: 1.75rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .bio {
      font-size: 0.95rem;
      color: var(--text-secondary);
      text-align: center;
      max-width: 320px;
      margin: 0 auto 28px;
      line-height: 1.55;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      list-style: none;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 18px 24px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 16px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 500;
      transition: background 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
      cursor: pointer;
    }

    .link-btn:hover {
      background: var(--btn-hover);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-btn .emoji {
      font-size: 1.35rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .link-btn .label {
      flex: 1;
    }

    .link-btn .arrow {
      opacity: 0.35;
      font-size: 1.1rem;
      line-height: 1;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30, 30, 50, 0.95);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.875rem;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 380px) {
      .card {
        padding: 32px 20px 24px;
      }

      .avatar {
        width: 100px;
        height: 100px;
      }

      .name {
        font-size: 1.5rem;
      }

      .bio {
        font-size: 0.875rem;
      }

      .link-btn {
        padding: 16px 20px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="card">
      <div class="avatar-wrap">
        <img class="avatar" src="avatar2.png" alt="Степан Серегин" width="120" height="120">
      </div>

      <h1 class="name">Степан Серегин</h1>
      <p class="bio">AI-разработчик и специалист по автоматизации бизнеса. Создаю AI-агентов, чат-ботов и автоматизации, которые помогают бизнесу обрабатывать заявки, экономить время и увеличивать продажи.</p>

      <ul class="links">
        <li>
          <a class="link-btn" href="https://t.me/stepka_seregin" target="_blank" rel="noopener noreferrer">
            <span class="emoji" aria-hidden="true">✈️</span>
            <span class="label">Telegram</span>
            <span class="arrow">›</span>
          </a>
        </li>
        <li>
          <a class="link-btn" href="https://www.instagram.com/step_ka08?igsh=MTY5aWZzNDhjOGNrZQ%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer">
            <span class="emoji" aria-hidden="true">📸</span>
            <span class="label">Instagram</span>
            <span class="arrow">›</span>
          </a>
        </li>
        <li>
          <a class="link-btn" href="https://www.tiktok.com/@step_kaa?_r=1&_t=ZS-97mcAgnzsqy" target="_blank" rel="noopener noreferrer">
            <span class="emoji" aria-hidden="true">🎵</span>
            <span class="label">TikTok</span>
            <span class="arrow">›</span>
          </a>
        </li>
        <li>
          <button class="link-btn" id="email-btn" type="button">
            <span class="emoji" aria-hidden="true">✉️</span>
            <span class="label">Email</span>
            <span class="arrow">›</span>
          </button>
        </li>
      </ul>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const email = 'general08died@gmail.com';
    const emailBtn = document.getElementById('email-btn');
    const toast = document.getElementById('toast');
    let toastTimer;

    function showToast(message) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    emailBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(email);
        showToast('Email скопирован: ' + email);
      } catch {
        window.location.href = 'mailto:' + email;
      }
    });
  </script>
</body>
</html>
